<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐素养闯关测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 750px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 2rem; margin: 1rem; }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 1.5rem; }
    .progress-bar { display: flex; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 4px; }
    .progress-step { flex: 1; text-align: center; padding: 0.5rem 0.2rem; background: #ecf0f1; color: #7f8c8d; border-radius: 20px; font-size: 0.75rem; transition: all 0.3s; }
    .progress-step.active { background: #3498db; color: white; }
    .progress-step.completed { background: #2ecc71; color: white; }
    .question { margin-bottom: 1.8rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; }
    .question-text { font-weight: bold; margin-bottom: 0.4rem; }
    audio { width: 100%; margin-bottom: 0.5rem; }
    .options { margin-top: 0.3rem; }
    .option { display: block; margin: 0.25rem 0; }
    .fill-in { margin: 0.3rem 0; }
    .fill-in input, .fill-in select { padding: 0.4rem; margin: 0.2rem; border: 1px solid #bdc3c7; border-radius: 4px; }
    .section-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.4rem; flex-wrap: wrap; }
    .btn { background: #3498db; color: white; border: none; padding: 0.55rem 1.1rem; border-radius: 6px; cursor: pointer; font-size: 0.95rem; margin: 0.4rem; }
    .btn:hover { background: #2980b9; }
    .btn-disabled { background: #bdc3c7; cursor: not-allowed; }
    .result { text-align: center; padding: 2rem; }
    .final-grade { font-size: 2rem; font-weight: bold; color: #e67e22; }
    .hidden { display: none; }
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 1.5rem; }
    .warning { color: #e74c3c; font-size: 0.85rem; margin-top: 0.5rem; }
    .abandon-label { margin-left: 1rem; color: #888; font-size: 0.9rem; cursor: pointer; user-select: none; }
    .declaration { background: #fef9e7; border-left: 4px solid #f1c40f; padding: 1rem; margin: 1rem 0; border-radius: 6px; font-size: 0.9rem; line-height: 1.5; }
    .debug-answer { margin-top: 0.5rem; font-size: 0.85rem; color: #27ae60; background: #eafaf1; padding: 0.3rem 0.6rem; border-radius: 4px; }
    @media (max-width: 480px) {
      .container { padding: 1rem; }
      .progress-step { font-size: 0.65rem; padding: 0.4rem 0.1rem; }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>
  <script>
    // ======================= 题目数据 =======================
    const allQuestions = [
      // 第一关 基础级
      { level:1, id:'1.1', type:'radio', audio:'audio/1.1.mp3', q:'这段音乐给你的最主要情绪感受是？', opts:['A. 紧张、悬疑','B. 快乐、兴奋','C. 悲伤、抒情','D. 平静、放松'], ans:'B' },
      { level:1, id:'1.2', type:'radio', audio:'audio/1.2.mp3', q:'这段音乐的情绪感受是？', opts:['A. 紧张、悬疑','B. 快乐、有趣','C. 悲伤、抒情','D. 愤怒、爆发'], ans:'C' },
      { level:1, id:'1.3', type:'radio', audio:'audio/1.3.mp3', q:'这段音乐营造的情绪是？', opts:['A. 浪漫约会','B. 紧张悬疑','C. 夜店舞动','D. 田园风光'], ans:'C' },
      { level:1, id:'1.4', type:'radio', audio:'audio/1.4.mp3', q:'这段音乐最适合什么场景？', opts:['A.体育比赛','B.夜店派对','C.助眠/放松','D.行军'], ans:'C' },
      { level:1, id:'1.5', type:'radio', audio:'audio/1.5.mp3', q:'这段音乐副歌出现在第几秒？', opts:['A.0秒','B.17秒','C.27秒','D.36秒'], ans:'C' },
      { level:1, id:'1.6', type:'radio', audio:'audio/1.6.mp3', q:'这段音乐最适合什么场景？', opts:['A.古典音乐会','B.街头篮球/潮牌广告','C.瑜伽冥想','D.教堂礼拜'], ans:'B' },
      { level:1, id:'1.7', type:'radio', audio:'audio/1.7.mp3', q:'你如何描述这位歌手的人声音色？', opts:['A.浑厚有力','B.清亮尖细','C.气声轻柔略带沙哑','D.低沉粗犷'], ans:'C' },
      { level:1, id:'1.8', type:'radio', audio:'audio/1.8.mp3', q:'这段人声的音色最显著的特征是？', opts:['A. 沙哑厚实','B. 清亮柔美','C. 气声梦幻','D. 锐利有力'], ans:'A' },
      { level:1, id:'1.9', type:'radio', audio:'audio/1.9.mp3', q:'这个声音最适合用什么词形容？', opts:['A.嘶哑','B.浑厚低沉','C.丝滑圆润','D.尖锐刺耳'], ans:'C' },
      { level:1, id:'1.10', type:'radio', audio:'audio/1.10.mp3', q:'该音色的特点是？', opts:['A.低沉沙哑','B.气音空灵虚幻','C.高亢明亮穿透力强','D.慵懒放松'], ans:'C' },
      // 第二关 进阶级
      { level:2, id:'2.1', type:'radio', audio:'audio/2.1.mp3', q:'这首歌曲最可能属于以下哪个风格大类？', opts:['A. 电子','B. 摇滚','C. 说唱','D. 流行','E. 爵士','F. 另类独立'], ans:'B' },
      { level:2, id:'2.2', type:'radio', audio:'audio/2.2.mp3', q:'这首歌曲最可能属于以下哪个风格大类？', opts:['A. 说唱','B. 爵士','C. 古典','D. 民谣','E. 电子','F. 摇滚'], ans:'A' },
      { level:2, id:'2.3', type:'radio', audio:'audio/2.3.mp3', q:'这首歌曲最可能属于以下哪个风格大类？', opts:['A. 说唱','B. 爵士','C. 古典','D. 民谣','E. 电子','F. 摇滚'], ans:'B' },
      { level:2, id:'2.4', type:'radio', audio:'audio/2.4.mp3', q:'这首歌曲最可能属于以下哪个风格大类？', opts:['A. 说唱','B. 爵士','C. 古典','D. 民谣','E. 电子','F. 摇滚'], ans:'E' },
      { level:2, id:'2.5', type:'radio', audio:'audio/2.5.mp3', q:'这个音频中，主要演奏乐器是？', opts:['A.吉他','B.钢琴','C.小提琴','D.合成器'], ans:'B' },
      { level:2, id:'2.6', type:'radio', audio:'audio/2.6.mp3', q:'这个音频中，除鼓外最突出的乐器是？', opts:['A.原声吉他','B.电吉他','C.萨克斯','D.管风琴'], ans:'A' },
      { level:2, id:'2.7', type:'radio', audio:'audio/2.7.mp3', q:'这个音频中，旋律的主要乐器类型是？', opts:['A.原声钢琴','B.合成器','C.小号','D.竖琴'], ans:'B' },
      { level:2, id:'2.8', type:'bool', audio:'audio/2.8.mp3', q:'听完整个音频，你认为副歌出现在第27秒。', ans:false },
      { level:2, id:'2.9', type:'bool', audio:'audio/2.9.mp3', q:'在音乐中有人声的合音？', ans:true },
      { level:2, id:'2.10', type:'bool', audio:'audio/2.10.mp3', q:'整段音乐只使用了钢琴和弦乐两种配器。', ans:false },
      // 第三关 乐迷级
      { level:3, id:'3.1', type:'radio', audio:'audio/3.1.mp3', q:'这段音乐的拍号是？', opts:['A. 4/4','B. 3/4','C. 6/8','D. 7/8'], ans:'C' },
      { level:3, id:'3.2', type:'radio', audio:'audio/3.2.mp3', q:'这段音乐的拍号是？', opts:['A. 2/4','B. 3/4','C. 4/4','D. 5/4'], ans:'A' },
      { level:3, id:'3.3', type:'radio', audio:'audio/3.3.mp3', q:'这段音乐的速度区间是？', opts:['A. 50-70','B. 70-90','C.90-120','D.120-140','E.140以上'], ans:'A' },
      { level:3, id:'3.4', type:'radio', audio:'audio/3.4.mp3', q:'这段音乐的速度区间是？', opts:['A. 50-70','B. 70-90','C.90-120','D.120-150','E.150以上'], ans:'D' },
      { level:3, id:'3.5', type:'radio', audio:'audio/3.5.mp3', q:'这段音乐最具特色的独奏乐器是？', opts:['A.手风琴(Bandoneón)','B.萨克斯','C.长笛','D.西塔琴'], ans:'A' },
      { level:3, id:'3.6', type:'radio', audio:'audio/3.6.mp3', q:'这段音乐的节奏型最符合以下哪种风格的特征？', opts:['A. Bossa Nova','B. Funk','C. Reggae','D. Disco','E. Swing','F. Samba','G. Reggaeton','H. Blues Shuffle','I. Dancehall','J. Jersey Club'], ans:'B' },
      { level:3, id:'3.7', type:'radio', audio:'audio/3.7.mp3', q:'这是一首jazz风格的歌曲，请选出具体的二级风格名称：', opts:['A. Acid jazz','B. smooth jazz','C. fusion jazz','D. Bebop','E. Bossa Nova','F. Bigband','G. Ragtime'], ans:'B' },
      { level:3, id:'3.8', type:'timeInput', audio:'audio/3.8.mp3', q:'听片段（全长约2分钟），副歌开始的时间是？填分钟和秒数。误差±2秒得分。（如果不足1分钟，请在“分钟”栏填0）', ans:{min:1, sec:16}, score:10 },
      { level:3, id:'3.9', type:'multi', audio:'audio/3.9.mp3', q:'歌曲中主要出现的乐器名称（多选，漏选或错选不得分）', opts:['A.小号','B.电吉他','C.架子鼓','D.长笛','E.合成器','F.贝斯'], ans:['B','C','F'], score:20 },
      // 第四关 专业级
      { level:4, id:'4.1', type:'radio', audio:'audio/4.1.mp3', q:'这段音频最符合哪个结构术语？', opts:['A. Post-chorus','B. Breakdown','C. Buildup','D. Intro'], ans:'C' },
      { level:4, id:'4.2', type:'keyInput', audio:'audio/4.2.mp3', q:'这段音频的调式是？（精度到大调和小调即可）', ans:{letter:'E', mode:'minor'}, score:10 },
      { level:4, id:'4.3', type:'keyChangeInput', audio:'audio/4.3.mp3', q:'歌曲中从什么调式转到了什么调式？', ans:{fromLetter:'F#', fromMode:'major', toLetter:'G#', toMode:'major'}, score:10 },
      { level:4, id:'4.4', type:'multi', audio:'audio/4.4.mp3', q:'你能同时听到哪几种配器？（多选）', opts:['A. 木吉他','B. 钢琴','C. 电子鼓','D. 合成器','E. 大提琴'], ans:['A','B','C','D'], scoring:'custom', customScore: function(user){ const set=new Set(user); const correct=new Set(['A','B','C','D']); if(set.size===3 && set.has('A')&&set.has('C')&&set.has('D')&&!set.has('B')) return 10; if(set.size===4 && set.has('A')&&set.has('B')&&set.has('C')&&set.has('D')) return 15; return 0; } },
      { level:4, id:'4.5', type:'multi', audio:'audio/4.5.mp3', q:'你能同时听到哪几种配器？（多选）每选对一个得5分，选错0分', opts:['A. 架子鼓','B. 电子鼓','C. 钢琴','D. 长号','E. 合成器bass','F. 电bass','G. 小提琴','H. 木吉他'], ans:['B','C','F','H'], scoring:'positive', score:20 },
      { level:4, id:'4.6', type:'secInput', audio:'audio/4.6.mp3', q:'歌曲中出现的Bridge段落出现在第几秒？填秒数，误差±2秒得分。', ans:21, score:10 },
      { level:4, id:'4.7', type:'sections', audio:'audio/4.7.mp3', q:'听片段，请标记每个段落开始的时间，并正确填空标记每个段落的名称。', structures:['intro','verse','chorus','bridge','interlude','outro'], ans:[{min:0,sec:0,label:'intro'},{min:0,sec:8,label:'verse'},{min:0,sec:41,label:'chorus'},{min:1,sec:16,label:'verse'},{min:1,sec:39,label:'chorus'},{min:2,sec:15,label:'bridge'},{min:2,sec:40,label:'chorus'},{min:3,sec:30,label:'outro'}], score:20 },
      { level:4, id:'4.8', type:'chordProgression', audio:'audio/4.8.mp3', q:'这是四个和弦的循环。请按顺序填写和弦名称（只需写大小三和弦，如 Dm、Bb 等，中间用,隔开）。并在第二行用罗马数字级数表示这组和声进行（使用v和i来表示罗马数字，大和弦用大写，小和弦用小写，中间用,隔开）', chords:[{name:'D',roman:'I'},{name:'A',roman:'V'},{name:'Bm',roman:'vi'},{name:'G',roman:'IV'}], score:5 },
      // 第五关 制作人级
      { level:5, id:'5.1', type:'radio', audio:'audio/5.1.mp3', q:'听贝斯音色，最贴切的形容是？', opts:['A. 无品原声贝斯，音色柔和','B. 合成器sub bass，圆润厚重','C. 带失真的合成器贝斯，中高频突出且肥厚','D. 拨片演奏的P贝斯，音头有力'], ans:'B' },
      { level:5, id:'5.2', type:'multi', audio:'audio/5.2.mp3', q:'音频中的人声主要使用了哪些效果器处理？（多选，错选0分）', opts:['A. reverb效果器','B. delay效果器','C. 明显的auto-tune效果器','D. Compressor效果器','E. pitch效果器','F. side-chain效果器'], ans:['A','B','D'], scoring:'allCorrect', score:10 },
      { level:5, id:'5.3', type:'multi', audio:'audio/5.3.mp3', q:'听这段音乐中的solo电吉他，选出所有正确的描述（多选。每个正确选项得5分，若选错任何其他选项则本题0分）', opts:['A. 使用了过载','B. 使用了哇音踏板','C. 清音音色，无其他效果','D. 带有明显的混响','E. 带有明显的延迟','F. 使用了摇把/弯音','G. 带有颤音效果','H. 带有镶边效果','I. 带有合唱效果'], ans:['A','D','E','F'], scoring:'allCorrect', score:20 },
      { level:5, id:'5.4', type:'sections', audio:'audio/5.4.mp3', q:'听片段，请标记每个段落开始的秒数，并标记段落名称。', structures:['intro','verse','chorus','pre-chorus','post-chorus','bridge','solo','interlude','breakdown','outro'], ans:[{min:0,sec:0,label:'intro'},{min:0,sec:16,label:'chorus'},{min:0,sec:44,label:'verse'},{min:0,sec:59,label:'chorus'},{min:1,sec:12,label:'verse'},{min:1,sec:28,label:'chorus'},{min:1,sec:39,label:'bridge'},{min:1,sec:55,label:'chorus'},{min:2,sec:19,label:'breakdown'},{min:2,sec:34,label:'solo'},{min:2,sec:43,label:'outro'}], score:22 },
      { level:5, id:'5.5', type:'chordDetail', audio:'audio/5.5.mp3', q:'听仔细这段音乐中的和弦进行，请写出和弦的准确名称。', chordsData:[{root:'G',quality:'maj',ext:'7'},{root:'G',quality:'min',ext:'6'},{root:'F#',quality:'min',ext:'7'},{root:'B',quality:'/',ext:'7'},{root:'E',quality:'min',ext:'9'},{root:'G#',quality:'dim',ext:'/'},{root:'A',quality:'sus',ext:'4'}], score:28 },
      { level:5, id:'5.6', type:'romanDetail', audio:'audio/5.6.mp3', q:'请用阿拉伯数字表示和声的级数，和弦属性要准确，不需要填的选项，可以选“/”或者输入“/”', progression:[{degree:'1',quality:'maj',ext:'7'},{degree:'3',quality:'/',ext:'7'},{degree:'6',quality:'min',ext:'7'},{degree:'4',quality:'maj',ext:'/'},{degree:'5',quality:'sus',ext:'4'}], score:10 }
    ];

    const passScores = [90, 90, 80, 70, 60];
    const levelNames = ['基础级', '进阶级', '乐迷级', '专业级', '制作人级'];

    const urlParams = new URLSearchParams(window.location.search);
    const isDebug = urlParams.get('debug') === 'true';

    let state = {
      playerName: '',
      currentLevel: 0,
      answers: {},
      scores: [],
      clearedLevel: 0,
      finished: false
    };

    const app = document.getElementById('app');

    // 等音统一映射为升号
    const enharmonicMap = {
      'C':'C','C#':'C#','DB':'C#','D':'D','D#':'D#','EB':'D#','E':'E','F':'F','F#':'F#','GB':'F#','G':'G','G#':'G#','AB':'G#','A':'A','A#':'A#','BB':'A#','B':'B'
    };

    function normalizePitch(p) {
      if (!p) return p;
      let s = p.trim().toUpperCase();
      if (/^[#B]/.test(s) && s.length > 1) {
        s = s.substring(1) + s.charAt(0);
      }
      if (s.endsWith('B') && s.length > 1) s = s.slice(0,-1) + 'b';
      return enharmonicMap[s] || s;
    }

    // 通用音名选项列表
    const pitchOptions = ['C', 'C# / Db', 'D', 'D# / Eb', 'E', 'F', 'F# / Gb', 'G', 'G# / Ab', 'A', 'A# / Bb', 'B'];
    function getPitchSelectOptions(selectedValue) {
      let html = '';
      pitchOptions.forEach(p => {
        const val = p.split(' ')[0]; // 取第一个作为值，即升号表示
        html += `<option value="${val}" ${selectedValue === val ? 'selected' : ''}>${p}</option>`;
      });
      return html;
    }

    // 延伸音选项
    const extOptions = ['/', '2', '3', '4', '5', '6', '7', '9', '11', '13', 'b5', 'b11', 'b13'];
    function getExtSelectOptions(selectedValue) {
      let html = '';
      extOptions.forEach(v => {
        html += `<option value="${v}" ${selectedValue === v ? 'selected' : ''}>${v}</option>`;
      });
      return html;
    }

    window.toggleAbandon = function(checkbox, qid) {
      const block = document.querySelector(`.question-block[data-qid="${qid}"]`);
      if (!block) return;
      const inputs = block.querySelectorAll('input, select, textarea');
      inputs.forEach(el => {
        if (el === checkbox) return;
        el.disabled = checkbox.checked;
      });
    };

    function renderNameForm() {
      let html = `<h1>音乐素养闯关测试</h1>`;
      html += `<div class="declaration">
        <strong>严正声明</strong><br>
        诚实回答是对自己负责。我们会基于真实信息，帮你找到最能发挥个人优势的项目。
        遇到完全不懂的题目请选择<strong>“放弃本题”</strong>。
        反之，如果靠猜测答对而进入不适合的项目，最终你也无法胜任，对双方都不利。
      </div>`;
      html += `<div style="text-align:center"><label>请输入您的姓名：</label><input type="text" id="nameInput" style="padding:0.5rem;margin:1rem;width:200px;"></div>`;
      html += `<div style="text-align:center"><button class="btn" onclick="startTest()">开始测试</button></div>`;
      html += `<p class="warning">⚠ 刷新页面将丢失所有进度</p>`;
      app.innerHTML = html;
    }

    function startTest() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) { alert('请输入姓名'); return; }
      state.playerName = name;
      state.currentLevel = 1;
      state.answers = {};
      state.scores = [];
      state.clearedLevel = 0;
      state.finished = false;
      renderLevel(1);
    }

    function getQuestionsByLevel(level) {
      return allQuestions.filter(q => q.level === level);
    }

    function renderLevel(level) {
      const questions = getQuestionsByLevel(level);
      if (questions.length === 0) { finishTest(); return; }
      let html = renderProgressBar(level);
      html += `<h2 style="margin-bottom:1rem;">第${level}关：${levelNames[level-1]}</h2>`;
      html += `<form id="levelForm">`;
      questions.forEach((q, idx) => {
        html += renderQuestion(q, idx);
      });
      html += `</form>`;
      html += `<div class="nav-buttons"><button class="btn" onclick="submitLevel(${level})">提交本关</button></div>`;
      html += `<p class="warning">⚠ 提交后不可修改，请仔细检查。</p>`;
      app.innerHTML = html;

      // 恢复已保存的答案
      if (state.answers[level]) {
        const saved = state.answers[level];
        for (const [id, ans] of Object.entries(saved)) {
          const q = questions.find(q => q.id === id);
          if (!q) continue;
          const checkbox = document.querySelector(`.abandon-check[data-qid="${id}"]`);
          if (ans === '__ABANDONED__') {
            if (checkbox) { checkbox.checked = true; toggleAbandon(checkbox, id); }
            continue;
          }
          if (q.type === 'radio' || q.type === 'bool') {
            const radios = document.getElementsByName(`q${id}`);
            radios.forEach(r => { if (r.value === ans.toString()) r.checked = true; });
          } else if (q.type === 'timeInput') {
            document.getElementById(`min_${id}`).value = ans.min;
            document.getElementById(`sec_${id}`).value = ans.sec;
          } else if (q.type === 'secInput') {
            document.getElementById(`sec_${id}`).value = ans;
          } else if (q.type === 'multi') {
            const checks = document.getElementsByName(`q${id}`);
            checks.forEach(c => { if (ans.includes(c.value)) c.checked = true; });
          } else if (q.type === 'keyInput') {
            document.getElementById(`letter_${id}`).value = ans.letter;
            document.getElementById(`mode_${id}`).value = ans.mode;
          } else if (q.type === 'keyChangeInput') {
            document.getElementById(`fromLetter_${id}`).value = ans.fromLetter;
            document.getElementById(`fromMode_${id}`).value = ans.fromMode;
            document.getElementById(`toLetter_${id}`).value = ans.toLetter;
            document.getElementById(`toMode_${id}`).value = ans.toMode;
          } else if (q.type === 'chordProgression') {
            document.getElementById(`chordNames_${id}`).value = ans.chordNames || '';
            document.getElementById(`romanNums_${id}`).value = ans.romanNums || '';
          } else if (q.type === 'chordDetail') {
            for (let i=0;i<q.chordsData.length;i++) {
              document.getElementById(`root_${id}_${i}`).value = ans[i]?.root || '';
              document.getElementById(`quality_${id}_${i}`).value = ans[i]?.quality || 'maj';
              document.getElementById(`ext_${id}_${i}`).value = ans[i]?.ext || '/';
            }
          } else if (q.type === 'romanDetail') {
            for (let i=0;i<q.progression.length;i++) {
              document.getElementById(`deg_${id}_${i}`).value = ans[i]?.degree || '1';
              document.getElementById(`qual_${id}_${i}`).value = ans[i]?.quality || 'maj';
              document.getElementById(`extR_${id}_${i}`).value = ans[i]?.ext || '/';
            }
          }
        }
      }
    }

    function renderProgressBar(currentLevel) {
      let html = `<div class="progress-bar">`;
      for (let i=0; i<5; i++) {
        let cls = '';
        if (i+1 < currentLevel) cls = 'completed';
        else if (i+1 === currentLevel) cls = 'active';
        html += `<div class="progress-step ${cls}">${levelNames[i]}</div>`;
      }
      html += `</div>`;
      return html;
    }

    function getDebugAnswerText(q) {
      if (q.type === 'radio') return `正确答案：${q.ans}`;
      if (q.type === 'bool') return `正确答案：${q.ans ? '正确' : '错误'}`;
      if (q.type === 'timeInput') return `正确答案：${q.ans.min}分${q.ans.sec}秒`;
      if (q.type === 'secInput') return `正确答案：${q.ans}秒`;
      if (q.type === 'multi') return `正确答案：${q.ans.join(', ')}`;
      if (q.type === 'keyInput') return `正确答案：${q.ans.letter} ${q.ans.mode}`;
      if (q.type === 'keyChangeInput') return `正确答案：${q.ans.fromLetter} ${q.ans.fromMode} → ${q.ans.toLetter} ${q.ans.toMode}`;
      if (q.type === 'sections') return `正确答案：${q.ans.map(a => `${a.min}:${a.sec} ${a.label}`).join(', ')}`;
      if (q.type === 'chordProgression') return `正确答案：和弦 ${q.chords.map(c=>c.name).join(', ')}；级数 ${q.chords.map(c=>c.roman).join(', ')}`;
      if (q.type === 'chordDetail') return `正确答案：${q.chordsData.map(c => `${c.root} ${c.quality} ${c.ext}`).join(', ')}`;
      if (q.type === 'romanDetail') return `正确答案：${q.progression.map(p => `${p.degree} ${p.quality} ${p.ext}`).join(' - ')}`;
      return '';
    }

    function renderQuestion(q, idx) {
      let html = `<div class="question question-block" data-qid="${q.id}">`;
      html += `<div class="question-text">${idx+1}. ${q.q}</div>`;
      html += `<audio controls src="${q.audio}"></audio>`;

      if (q.type === 'radio') {
        html += `<div class="options">`;
        q.opts.forEach(opt => {
          html += `<label class="option"><input type="radio" name="q${q.id}" value="${opt.charAt(0)}"> ${opt}</label>`;
        });
        html += `</div>`;
      } else if (q.type === 'bool') {
        html += `<div class="options">`;
        html += `<label class="option"><input type="radio" name="q${q.id}" value="true"> 正确</label>`;
        html += `<label class="option"><input type="radio" name="q${q.id}" value="false"> 错误</label>`;
        html += `</div>`;
      } else if (q.type === 'timeInput') {
        html += `<div class="fill-in"><input type="number" id="min_${q.id}" placeholder="分钟" min="0" style="width:70px"> 分 
          <input type="number" id="sec_${q.id}" placeholder="秒" min="0" max="59" style="width:70px"> 秒</div>`;
      } else if (q.type === 'secInput') {
        html += `<div class="fill-in"><input type="number" id="sec_${q.id}" placeholder="秒数" min="0" style="width:80px"> 秒</div>`;
      } else if (q.type === 'multi') {
        html += `<div class="options">`;
        q.opts.forEach(opt => {
          html += `<label class="option"><input type="checkbox" name="q${q.id}" value="${opt.charAt(0)}"> ${opt}</label>`;
        });
        html += `</div>`;
      } else if (q.type === 'keyInput') {
        html += `<div class="fill-in">调性: 
          <select id="letter_${q.id}">${getPitchSelectOptions('E')}</select>
          <select id="mode_${q.id}"><option value="major">major</option><option value="minor" selected>minor</option></select></div>`;
      } else if (q.type === 'keyChangeInput') {
        html += `<div class="fill-in">从 
          <select id="fromLetter_${q.id}">${getPitchSelectOptions('F#')}</select>
          <select id="fromMode_${q.id}"><option value="major" selected>major</option><option value="minor">minor</option></select>
          转到 <select id="toLetter_${q.id}">${getPitchSelectOptions('G#')}</select>
          <select id="toMode_${q.id}"><option value="major" selected>major</option><option value="minor">minor</option></select></div>`;
      } else if (q.type === 'sections') {
        html += `<div>请添加段落节点（时间：分:秒，结构选择）：</div>`;
        html += `<div id="sectionContainer_${q.id}"></div>`;
        html += `<button type="button" class="btn" onclick="addSectionRow('${q.id}')">+ 添加段落</button>`;
        setTimeout(() => {
          const container = document.getElementById(`sectionContainer_${q.id}`);
          if (container && container.children.length === 0) {
            addSectionRow(q.id);
          }
        }, 0);
      } else if (q.type === 'chordProgression') {
        html += `<div>和弦名称: <input type="text" id="chordNames_${q.id}" placeholder="如 D, A, Bm, G"></div>`;
        html += `<div>罗马级数: <input type="text" id="romanNums_${q.id}" placeholder="如 I, V, vi, IV"></div>`;
      } else if (q.type === 'chordDetail') {
        html += `<div>`;
        q.chordsData.forEach((ch, i) => {
          html += `<div class="fill-in">和弦${i+1}: 
            <select id="root_${q.id}_${i}">${getPitchSelectOptions(ch.root)}</select>
            <select id="quality_${q.id}_${i}">
              <option value="maj" ${ch.quality==='maj'?'selected':''}>maj</option>
              <option value="min" ${ch.quality==='min'?'selected':''}>min</option>
              <option value="dim" ${ch.quality==='dim'?'selected':''}>dim</option>
              <option value="aug" ${ch.quality==='aug'?'selected':''}>aug</option>
              <option value="sus" ${ch.quality==='sus'?'selected':''}>sus</option>
              <option value="mM" ${ch.quality==='mM'?'selected':''}>mM</option>
              <option value="ø" ${ch.quality==='ø'?'selected':''}>ø</option>
              <option value="add" ${ch.quality==='add'?'selected':''}>add</option>
              <option value="/" ${ch.quality==='/'?'selected':''}>/</option>
            </select>
            <select id="ext_${q.id}_${i}">${getExtSelectOptions(ch.ext)}</select>
          </div>`;
        });
        html += `</div>`;
      } else if (q.type === 'romanDetail') {
        html += `<div>`;
        q.progression.forEach((p, i) => {
          html += `<div class="fill-in">和声${i+1}: 
            <select id="deg_${q.id}_${i}">
              ${['1','b2','2','b3','3','4','#4','5','b6','6','b7','7'].map(d => `<option value="${d}" ${p.degree===d?'selected':''}>${d}</option>`).join('')}
            </select>
            <select id="qual_${q.id}_${i}">
              <option value="maj" ${p.quality==='maj'?'selected':''}>maj</option>
              <option value="min" ${p.quality==='min'?'selected':''}>min</option>
              <option value="dim" ${p.quality==='dim'?'selected':''}>dim</option>
              <option value="aug" ${p.quality==='aug'?'selected':''}>aug</option>
              <option value="sus" ${p.quality==='sus'?'selected':''}>sus</option>
              <option value="mM" ${p.quality==='mM'?'selected':''}>mM</option>
              <option value="ø" ${p.quality==='ø'?'selected':''}>ø</option>
              <option value="add" ${p.quality==='add'?'selected':''}>add</option>
              <option value="/" ${p.quality==='/'?'selected':''}>/</option>
            </select>
            <select id="extR_${q.id}_${i}">${getExtSelectOptions(p.ext)}</select>
          </div>`;
        });
        html += `</div>`;
      }

      // debug 模式显示答案
      if (isDebug) {
        html += `<div class="debug-answer">${getDebugAnswerText(q)}</div>`;
      }

      html += `<label class="abandon-label"><input type="checkbox" class="abandon-check" data-qid="${q.id}" onchange="toggleAbandon(this, '${q.id}')"> 放弃本题（得0分）</label>`;
      html += `</div>`;
      return html;
    }

    window.addSectionRow = function(qid) {
      const container = document.getElementById(`sectionContainer_${qid}`);
      if (!container) return;
      const q = allQuestions.find(q => q.id === qid);
      const div = document.createElement('div');
      div.className = 'section-row';
      div.innerHTML = `
        <input type="number" placeholder="分" min="0" style="width:60px">
        <input type="number" placeholder="秒" min="0" max="59" style="width:60px">
        <select>${q.structures.map(s => `<option value="${s}">${s}</option>`).join('')}</select>
        <button type="button" onclick="this.parentElement.remove()">删除</button>
      `;
      container.appendChild(div);
    };

    function collectAnswers(level) {
      const questions = getQuestionsByLevel(level);
      let answers = {};
      questions.forEach(q => {
        try {
          const abandonCheck = document.querySelector(`.abandon-check[data-qid="${q.id}"]`);
          if (abandonCheck && abandonCheck.checked) {
            answers[q.id] = '__ABANDONED__';
            return;
          }
          if (q.type === 'radio') {
            const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
            answers[q.id] = selected ? selected.value : null;
          } else if (q.type === 'bool') {
            const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
            answers[q.id] = selected ? selected.value === 'true' : null;
          } else if (q.type === 'timeInput') {
            const min = parseInt(document.getElementById(`min_${q.id}`).value);
            const sec = parseInt(document.getElementById(`sec_${q.id}`).value);
            answers[q.id] = isNaN(min) || isNaN(sec) ? null : { min, sec };
          } else if (q.type === 'secInput') {
            const sec = parseInt(document.getElementById(`sec_${q.id}`).value);
            answers[q.id] = isNaN(sec) ? null : sec;
          } else if (q.type === 'multi') {
            const checked = document.querySelectorAll(`input[name="q${q.id}"]:checked`);
            answers[q.id] = Array.from(checked).map(c => c.value);
          } else if (q.type === 'keyInput') {
            const letter = document.getElementById(`letter_${q.id}`).value;
            const mode = document.getElementById(`mode_${q.id}`).value;
            answers[q.id] = { letter, mode };
          } else if (q.type === 'keyChangeInput') {
            const fl = document.getElementById(`fromLetter_${q.id}`).value;
            const fm = document.getElementById(`fromMode_${q.id}`).value;
            const tl = document.getElementById(`toLetter_${q.id}`).value;
            const tm = document.getElementById(`toMode_${q.id}`).value;
            answers[q.id] = { fromLetter: fl, fromMode: fm, toLetter: tl, toMode: tm };
          } else if (q.type === 'sections') {
            const rows = document.querySelectorAll(`#sectionContainer_${q.id} .section-row`);
            const secs = [];
            rows.forEach(row => {
              const inputs = row.querySelectorAll('input');
              const select = row.querySelector('select');
              const min = parseInt(inputs[0].value);
              const sec = parseInt(inputs[1].value);
              if (!isNaN(min) && !isNaN(sec) && select.value) {
                secs.push({ min, sec, label: select.value });
              }
            });
            answers[q.id] = secs;
          } else if (q.type === 'chordProgression') {
            answers[q.id] = {
              chordNames: document.getElementById(`chordNames_${q.id}`).value,
              romanNums: document.getElementById(`romanNums_${q.id}`).value
            };
          } else if (q.type === 'chordDetail') {
            const arr = [];
            for (let i=0; i<q.chordsData.length; i++) {
              arr.push({
                root: document.getElementById(`root_${q.id}_${i}`).value,
                quality: document.getElementById(`quality_${q.id}_${i}`).value,
                ext: document.getElementById(`ext_${q.id}_${i}`).value
              });
            }
            answers[q.id] = arr;
          } else if (q.type === 'romanDetail') {
            const arr = [];
            for (let i=0; i<q.progression.length; i++) {
              arr.push({
                degree: document.getElementById(`deg_${q.id}_${i}`).value,
                quality: document.getElementById(`qual_${q.id}_${i}`).value,
                ext: document.getElementById(`extR_${q.id}_${i}`).value
              });
            }
            answers[q.id] = arr;
          }
        } catch(e) {
          console.error(`收集答案出错 (题目${q.id}):`, e);
          answers[q.id] = null;
        }
      });
      return answers;
    }

    function scoreLevel(level, answers) {
      const questions = getQuestionsByLevel(level);
      let total = 0;
      questions.forEach(q => {
        try {
          const userAns = answers[q.id];
          if (userAns === '__ABANDONED__') return;
          let score = 0;
          if (q.type === 'radio') {
            if (userAns === q.ans) score = 10;
          } else if (q.type === 'bool') {
            if (userAns === q.ans) score = 10;
          } else if (q.type === 'timeInput') {
            if (userAns) {
              const ut = userAns.min*60 + userAns.sec;
              const ct = q.ans.min*60 + q.ans.sec;
              if (Math.abs(ut - ct) <= 2) score = q.score;
            }
          } else if (q.type === 'secInput') {
            if (userAns !== null && Math.abs(userAns - q.ans) <= 2) score = q.score;
          } else if (q.type === 'multi') {
            if (q.scoring === 'custom') {
              score = q.customScore(userAns);
            } else if (q.scoring === 'allCorrect') {
              const set1 = new Set(userAns);
              const set2 = new Set(q.ans);
              score = (set1.size === set2.size && [...set1].every(v => set2.has(v))) ? q.score : 0;
            } else if (q.scoring === 'positive') {
              let correct = 0;
              const answerSet = new Set(q.ans);
              let hasWrong = false;
              userAns.forEach(v => { if (!answerSet.has(v)) hasWrong = true; });
              if (hasWrong) score = 0;
              else {
                correct = userAns.filter(v => answerSet.has(v)).length;
                score = correct * 5;
              }
            } else {
              const set1 = new Set(userAns);
              const set2 = new Set(q.ans);
              score = (set1.size === set2.size && [...set1].every(v => set2.has(v))) ? q.score : 0;
            }
          } else if (q.type === 'keyInput') {
            if (userAns && normalizePitch(userAns.letter) === normalizePitch(q.ans.letter) && userAns.mode === q.ans.mode) score = q.score;
          } else if (q.type === 'keyChangeInput') {
            if (userAns && 
                normalizePitch(userAns.fromLetter) === normalizePitch(q.ans.fromLetter) &&
                userAns.fromMode === q.ans.fromMode &&
                normalizePitch(userAns.toLetter) === normalizePitch(q.ans.toLetter) &&
                userAns.toMode === q.ans.toMode) score = q.score;
          } else if (q.type === 'sections') {
            if (userAns && userAns.length) {
              let points = 0;
              const tol = 2;
              q.ans.forEach((correct, idx) => {
                const ua = userAns[idx];
                if (!ua) return;
                const ut = ua.min*60 + ua.sec;
                const ct = correct.min*60 + correct.sec;
                if (Math.abs(ut - ct) <= tol && ua.label === correct.label) {
                  points += (q.score / q.ans.length);
                }
              });
              score = Math.round(points);
            }
          } else if (q.type === 'chordProgression') {
            if (userAns) {
              const nameCorrect = userAns.chordNames.replace(/\s/g,'') === q.chords.map(c=>c.name).join(',');
              const romanCorrect = userAns.romanNums.replace(/\s/g,'') === q.chords.map(c=>c.roman).join(',');
              if (nameCorrect && romanCorrect) score = 5;
              else if (nameCorrect || romanCorrect) score = 2.5;
            }
          } else if (q.type === 'chordDetail') {
            if (userAns) {
              let correct = 0;
              for (let i=0; i<q.chordsData.length; i++) {
                const c = q.chordsData[i];
                const u = userAns[i];
                if (u && normalizePitch(u.root) === normalizePitch(c.root) && u.quality === c.quality && u.ext === c.ext) correct++;
              }
              score = correct * 4;
            }
          } else if (q.type === 'romanDetail') {
            if (userAns) {
              let correct = 0;
              for (let i=0; i<q.progression.length; i++) {
                const p = q.progression[i];
                const u = userAns[i];
                if (u && u.degree === p.degree && u.quality === p.quality && u.ext === p.ext) correct++;
              }
              score = correct * 2;
            }
          }
          total += score;
        } catch(e) {
          console.error(`评分出错 (题目${q.id}):`, e);
        }
      });
      return total;
    }

    function submitLevel(level) {
      try {
        const answers = collectAnswers(level);
        if (!state.answers) state.answers = {};
        state.answers[level] = answers;

        const score = scoreLevel(level, answers);
        state.scores[level-1] = score;
        const passScore = passScores[level-1];
        const passed = score >= passScore;

        let resultHtml = `<div class="result"><h2>第${level}关结果</h2>`;
        resultHtml += `<p>你的得分：<strong>${score}</strong> / 100 （晋级线 ${passScore} 分）</p>`;
        if (passed) {
          resultHtml += `<p style="color:green">🎉 恭喜你通过本关！</p>`;
          if (level < 5) {
            resultHtml += `<button class="btn" onclick="goToNextLevel(${level})">进入第${level+1}关</button>`;
          } else {
            finishTest(true);
            return;
          }
        } else {
          resultHtml += `<p style="color:red">很遗憾，未达到晋级线。</p>`;
          finishTest(false);
          return;
        }
        app.innerHTML = resultHtml;
      } catch(e) {
        console.error('提交关卡出错:', e);
        alert('提交时发生错误，请刷新页面后重新测试。');
      }
    }

    function goToNextLevel(currentLevel) {
      state.currentLevel = currentLevel + 1;
      state.clearedLevel = currentLevel;
      renderLevel(state.currentLevel);
    }

    function finishTest(passedLast) {
      state.finished = true;
      let finalCleared = 0;
      for (let i = 0; i < state.scores.length; i++) {
        if (state.scores[i] >= passScores[i]) finalCleared = i + 1;
        else break;
      }
      if (finalCleared === 5 && state.scores[4] < 60) finalCleared = 4;
      const grade = finalCleared === 0 ? '未达基础级' : levelNames[finalCleared-1];

      let resultHtml = `<div class="result"><h2>测试结束</h2>`;
      resultHtml += `<p>姓名：${state.playerName}</p>`;
      resultHtml += `<p>各关得分：${state.scores.join(', ')}</p>`;
      resultHtml += `<p class="final-grade">最终等级：${grade}</p>`;
      app.innerHTML = resultHtml;

      const payload = {
        name: state.playerName,
        level1Score: state.scores[0] || 0,
        level2Score: state.scores[1] || 0,
        level3Score: state.scores[2] || 0,
        level4Score: state.scores[3] || 0,
        level5Score: state.scores[4] || 0,
        finalGrade: grade,
        answers: JSON.stringify(state.answers)
      };
      fetch('https://script.google.com/macros/s/AKfycbyc3EjQ2_mnGJS3cYNNkDinidLD9u8hlPm4F9-Ig1V6FVIjD9FWbwVEaqCa_tC33NGJ/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(err => console.error('提交失败', err));
    }

    renderNameForm();
  </script>
